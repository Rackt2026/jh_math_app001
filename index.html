<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="数学マスター">
    
    <title>数学マスター極：符号の試練</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #eef2f3; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        .container { 
            background: white; 
            padding: 15px; 
            border-radius: 20px; 
            width: 95%; 
            max-width: 450px; 
            margin: 10px auto; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            box-sizing: border-box; 
            position: relative;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 5px;
        }
        .logo-img {
            max-width: 150px; 
            height: auto;
            border: none;
        }
        
        .level-btns { display: flex; gap: 4px; margin-bottom: 5px; z-index: 10; }
        .btn { padding: 8px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; font-size: 0.8rem; flex: 1; background-color: #ddd; -webkit-tap-highlight-color: transparent; }
        .level-btn.active { background-color: #2196f3; color: white; box-shadow: 0 3px 0 #1976d2; }

        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; z-index: 10; }
        .reset-btn { background-color: #f44336; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.75rem; border: none; cursor: pointer; }

        .info { display: flex; justify-content: space-around; font-size: 0.9rem; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 5px; }
        
        .problem-box { 
            background: #f8f9fa; 
            border-radius: 12px; 
            padding: 15px 10px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border: 1px solid #e0e0e0; 
            margin-bottom: 10px; 
            position: relative; 
            min-height: 120px; 
        }
        .problem { font-size: 2.2rem; font-weight: bold; color: #2c3e50; text-align: center; }
        
        #feedback-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: none; opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(255,255,255,0.8); }
        #feedback-overlay.show { opacity: 1; transform: scale(1); }
        #feedback-text { font-size: 3.5rem; font-weight: 900; text-align: center; line-height: 1.1; -webkit-text-stroke: 4px white; paint-order: stroke; }

        .hint { background: rgba(255, 249, 196, 1); padding: 8px; border-radius: 8px; font-size: 0.85rem; width: 90%; z-index: 10; margin-top: 10px; border: 1px solid #ffd600; text-align: center; font-weight: bold; }

        .display-area { font-size: 2.2rem; background: #fff; border: 2px solid #cbd5e0; border-radius: 10px; margin-bottom: 10px; height: 3.5rem; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #2196f3; flex-shrink: 0; }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex-shrink: 0; margin-bottom: 5px; }
        .num-btn { background-color: #fcfcfc; border: 1px solid #ddd; border-radius: 10px; font-size: 1.5rem; padding: 15px 0; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #ccc; -webkit-tap-highlight-color: transparent; }
        .num-btn:active { transform: translateY(2px); box-shadow: none; background-color: #eee; }
        .op-btn { background-color: #ff9800; color: white; border: none; box-shadow: 0 3px 0 #ef6c00; }
        .clear-btn { background-color: #9e9e9e; color: white; border: none; box-shadow: 0 3px 0 #757575; }
        .enter-btn { background-color: #4caf50; color: white; border: none; grid-column: span 2; font-size: 1.5rem; box-shadow: 0 4px 0 #388e3c; margin-top: 5px; padding: 15px 0; }

        .result-screen { display: none; text-align: center; justify-content: center; align-items: center; flex-direction: column; height: 90vh; background: #764ba2; color: white; border-radius: 20px; }
        
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 101; border-radius: 50%; }
    </style>
</head>
<body>

<div class="container" id="game-screen">
    <div id="feedback-overlay"><div id="feedback-text"></div></div>
    
    <div class="logo-container">
        <a href="https://manabiya-tsubame.com/" target="_blank" rel="noopener noreferrer">
            <img src="rogo.png" alt="Logo" class="logo-img">
        </a>
    </div>

    <div class="level-btns">
        <button class="btn level-btn active" onclick="selectLevel(1)">Lv.1</button>
        <button class="btn level-btn" onclick="selectLevel(2)">Lv.2</button>
        <button class="btn level-btn" onclick="selectLevel(3)">Lv.3</button>
        <button class="btn level-btn" onclick="selectLevel(4)">Lv.4</button>
        <button class="btn level-btn" onclick="selectLevel(5)">Lv.5</button>
    </div>

    <div class="header-controls">
        <div style="font-size: 0.8rem; color: #666;">Level <span id="current-lv-display">1</span></div>
        <button class="reset-btn" onclick="resetGame()">やり直す</button>
    </div>

    <div class="info">
        <div>残り: <span id="q-count">10</span></div>
        <div style="color:#4caf50">正解: <span id="correct-count">0</span></div>
        <div style="color:#f44336">ミス: <span id="miss-count">0</span></div>
    </div>

    <div class="problem-box" id="p-box">
        <div id="problem" class="problem">...</div>
        <div id="hint-area" class="hint" style="display:none"></div>
    </div>

    <div class="display-area" id="display-value"></div>
